<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Reset Password | Kolekar's Academy</title>
    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap">
    <!-- Main Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            position: relative;
        }

        .auth-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            position: relative;
            z-index: 10;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2.5rem;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .password-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .back-to-home {
            position: absolute;
            top: 2rem;
            left: 2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .back-to-home:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <a href="/" class="back-to-home">← Back to Homepage</a>

    <div class="auth-wrapper">
        <div class="auth-card">
            <!-- Brand Logo -->
            <div class="auth-logo">
                <img class="logo-icon" style="width:40px;height:40px;" src="{{ url_for('static', filename='images/logo.png') }}" alt="Kolekar's Academy Logo">
                <div class="logo-text">
                    <h3 style="font-family: var(--font-heading); font-weight:800; font-size:1.2rem; line-height:1; color: var(--text-main);">KOLEKAR'S ACADEMY</h3>
                </div>
            </div>

            <div id="auth-alert" class="form-message"></div>

            {% if error %}
            <!-- Error state if token is invalid or expired -->
            <div class="auth-header" style="margin-bottom: 0;">
                <h2 style="color: var(--primary);">Invalid Request</h2>
                <p style="margin-top: 1rem; color: var(--text-main);">{{ error }}</p>
                <div style="margin-top: 2rem;">
                    <a href="/" class="btn btn-primary" style="display: inline-block; width: 100%; text-decoration: none; text-align: center;">Go to Homepage</a>
                </div>
            </div>
            {% else %}
            <!-- RESET PASSWORD FORM -->
            <div class="auth-form-container active">
                <div class="auth-header">
                    <h2>Reset Password</h2>
                    <p>Enter your new password below to update your account access</p>
                </div>
                <form id="reset-password-form">
                    <input type="hidden" id="reset-token" value="{{ token }}">
                    
                    <div class="form-group">
                        <label for="new-password">New Password</label>
                        <input type="password" id="new-password" class="form-control" placeholder="Min 8 characters" required>
                        <div class="password-hint">Must contain at least 8 characters, letters and numbers.</div>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" class="form-control" placeholder="Re-enter password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem;">Update Password</button>
                </form>
            </div>
            {% endif %}
        </div>
    </div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    <script src="{{ url_for('static', filename='js/reset_password.js') }}"></script>
</body>
</html>
